<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
/* ===== 默认主题：高级大地色系 (莫兰迪/侘寂风) ===== */
:root {
    --bg-main: #F6F5F0;     
    --bg-card: #FFFFFF;     
    --color-text: #34433A;  
    --color-border: #E1DFD5;
    --color-link-btn: #8C7C61; 
}

/* ===== 全局样式 ===== */
* { box-sizing: border-box; } 

body {
    background: var(--bg-main);
    color: var(--color-text);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* ------------------- 私密模式：暗夜森林 ------------------- */
body.secret {
    background: #2B2D2A;    
    --color-text: #E8E6E1;  
    --bg-card: #363937;     
    --color-border: #4D524E;
    --color-link-btn: #B5A68D; 
}

/* ------------------- 基础组件结构 ------------------- */
h1 {
    text-align: center;
    margin: 20px 0;
    font-size: 26px;
}

/* 返回按钮样式 */
.back-btn {
    display: block;
    margin: 10px auto;
    background: none;
    border: none; 
    color: var(--color-link-btn); 
    padding: 8px 16px; 
    font-size: 14px; 
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    border-radius: 4px;
    transition: background 0.3s, color 0.3s;
    width: fit-content;
}
.back-btn:hover { background: rgba(140, 124, 97, 0.1); text-decoration: underline; }
body.secret .back-btn { color: var(--color-link-btn); }
body.secret .back-btn:hover { background: rgba(181, 166, 141, 0.15); }

/* 搜索栏 */
.search-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 0 auto 20px;
    max-width: 600px;
}
select, input, button {
    box-sizing: border-box;
    height: 36px;
    padding: 0 10px;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    background: var(--bg-card); 
    color: var(--color-text);
    font-size: 14px;
    transition: background 0.3s, border 0.3s, color 0.3s;
}
select, button#searchButton { flex-shrink: 0; white-space: nowrap; }
input { flex: 1; min-width: 0; }
select:focus, input:focus { outline: none; border-color: var(--color-link-btn); }

button#searchButton { background: var(--color-text); color: var(--bg-main); border-color: var(--color-text); font-weight: bold; cursor: pointer; }
button#searchButton:hover { opacity: 0.9; }

/* 默认移动端：强制显示所有分组内容 */
.group-section { display: block; margin-bottom: 40px; } 

.group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px; 
    border-bottom: 1px solid var(--color-border);
    padding-bottom: 4px;
}
.group-header h2 { font-size: 16px; margin: 0; }

.toggle-btn { background: none; border: none; color: var(--color-link-btn); padding: 0 5px; font-size: 14px; cursor: pointer; display: none; user-select: none; text-decoration: none; }
.toggle-btn:hover { text-decoration: underline; color: var(--color-link-btn); }
body.secret .toggle-btn:hover { color: var(--color-text); }

/* 链接卡片 (通用基础样式) */
.links-group {
    display: grid;
    gap: 12px;
    margin-top: 10px;
}
.link-card {
    background: var(--bg-card);
    border-radius: 6px;
    padding: 0 8px;
    border: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    height: 100%;
    box-sizing: border-box;
}
.link-card a { color: inherit; text-decoration: none; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; min-width: 0; flex: 1; margin-right: 5px; }
.copy-btn { cursor: pointer; font-size: 14px; color: #A3A097; }
.copy-btn:hover { color: var(--color-link-btn); }
.links-group.collapsed .link-card.hidden-by-limit { display: none; }

/* 隐蔽小圆点按钮 */
#unlockBtn { position: fixed; bottom: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; border: none; background: rgba(140, 124, 97, 0.3); cursor: pointer; padding: 0; z-index: 999; }
#unlockBtn:hover { background: rgba(140, 124, 97, 0.6); }
body.secret #unlockBtn { background: rgba(181, 166, 141, 0.2); }
body.secret #unlockBtn:hover { background: rgba(181, 166, 141, 0.5); }


/* =========================================================
   布局 1：手机端 (完全锁定 2列)
   ========================================================= */
.layout-wrapper { display: block; padding: 20px; max-width: 1200px; margin: 0 auto 50px; }
.nav-menu { display: none; } 

.links-group {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-auto-rows: 34px;
}

/* =========================================================
   布局 2：中等屏幕 (电脑端基础框架 + 自动适配列)
   ========================================================= */
@media (min-width: 850px) {
    .layout-wrapper { 
        display: flex; 
        max-width: 1400px; 
        margin: 0 auto; 
        align-items: flex-start; 
        padding: 0; 
    }
    
    .sidebar { 
        width: 220px; 
        flex-shrink: 0; 
        position: sticky; 
        top: 0; 
        height: 100vh; 
        overflow-y: auto; 
        border-right: 1px solid var(--color-border); 
        padding: 30px 20px; 
        box-sizing: border-box; 
    }
    .sidebar h1 { text-align: left; margin: 0 0 30px; font-size: 24px; }
    .sidebar .back-btn { margin: 0 0 30px 0; text-align: left; }
    
    .nav-menu { display: flex; flex-direction: column; gap: 8px; }
    
    .nav-item { 
        padding: 10px 14px; 
        border-radius: 6px; 
        cursor: pointer; 
        color: var(--color-text); 
        font-size: 15px; 
        transition: all 0.2s; 
        border-left: 3px solid transparent; 
    }
    .nav-item:hover { background: rgba(140, 124, 97, 0.1); }
    .nav-item.active { background: rgba(140, 124, 97, 0.15); color: var(--color-link-btn); font-weight: bold; border-left: 3px solid var(--color-link-btn); }
    
    body.secret .nav-item:hover { background: rgba(181, 166, 141, 0.1); }
    body.secret .nav-item.active { background: rgba(181, 166, 141, 0.25); color: var(--color-link-btn); border-left: 3px solid var(--color-link-btn);}

    .main-content { flex: 1; padding: 30px 50px; min-width: 0; }
    .search-bar { justify-content: center; margin: 0 auto 40px; }
    
    .group-section { display: none; margin-bottom: 0; } 
    .group-section.active { display: block; animation: fadeIn 0.3s ease; }
    
    .group-header { margin-top: 0; border-bottom: none; }
    
    /* 中屏：根据容器宽度自动排列，每列最小 160px，充满空间 */
    .links-group { 
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
        grid-auto-rows: 36px; 
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }
}

/* =========================================================
   布局 3：超大屏幕 (强制锁定 7列)
   ========================================================= */
@media (min-width: 1200px) {
    .links-group { 
        grid-template-columns: repeat(7, minmax(0, 1fr)); 
    }
}
</style>
</head>
<body>

    <aside class="sidebar">
        <h1 id="pageTitle">我的主页</h1>

    </aside>

    <main class="main-content">
        <div class="search-bar" id="searchBar">

<script defer>
const SECRET_PWD  = "709394"; 
const PRIVATE_PWD = "abcd"; 
const MOBILE_LIMIT = 10;
const DESKTOP_LIMIT = 9999; 

function getDisplayLimit() {
    return window.innerWidth <= 850 ? MOBILE_LIMIT : DESKTOP_LIMIT;
}

// 哈希指纹生成器 (用于自动版本缓存)
function hashCode(str) {
    let hash = 0;
    for (let i = 0, len = str.length; i < len; i++) {
        let chr = str.charCodeAt(i);
        hash = (hash << 5) - hash + chr;
        hash |= 0; 
    }
    return hash.toString();
}

// 核心解析器
function parseMarkdown(md) {
    const lines = md.split("\n");
    let html = "";
    let navHtml = ""; 
    let currentGroupName = "";
    let currentLinks = [];
    const displayLimit = getDisplayLimit();
    let isFirstGroup = true; 
    let groupIndex = 0; 

    function flushGroup() {
        if (!currentGroupName || currentLinks.length === 0) return;

        const groupId = `cat-${groupIndex++}`;
        const activeClass = isFirstGroup ? 'active' : ''; 
        
        navHtml += `<div class="nav-item ${activeClass}" data-target="${groupId}">${currentGroupName}</div>`;

        const totalLinks = currentLinks.length;
        const needsToggle = totalLinks > displayLimit;
        const collapsedClass = needsToggle ? 'collapsed' : '';
        const toggleBtnDisplay = needsToggle ? 'inline-block' : 'none';
        
        html += `<section class="group-section ${activeClass}" id="section-${groupId}">`;
        html += `<div class="group-header">
                    <h2>${currentGroupName}</h2>
                    <button class="toggle-btn" 
                            style="display: ${toggleBtnDisplay}" 
                            data-group-id="${groupId}"
                            data-collapsed="true">
                        展开 (${totalLinks} 个)
                    </button>
                </div>`;

        html += `<div class="links-group ${collapsedClass}" id="links-${groupId}">`;

        currentLinks.forEach((m, index) => {
            const isHidden = needsToggle && index >= displayLimit;
            const hiddenClass = isHidden ? 'hidden-by-limit' : '';
            html += `<div class="link-card ${hiddenClass}">
                        <a href="${m[2]}" target="_blank" rel="noopener noreferrer" title="${m[1]}">${m[1]}</a>
                        <span class="copy-btn" onclick="copyLink('${m[2]}', this)">📋</span>
                    </div>`;
        });
        
        html += `</div></section>`; 

        currentGroupName = "";
        currentLinks = [];
        isFirstGroup = false; 
    }

    lines.forEach(line => {
        line = line.trim();
        if (!line) return;
        if (line.startsWith("##")) {
            flushGroup();
            currentGroupName = line.replace(/^##+/, "").trim();
        } else if (line.startsWith("- [")) {
            const m = line.match(/- \[(.*?)\]\((.*?)\)/);
            if (m) currentLinks.push(m);
        }
    });
    flushGroup();
    return { html, navHtml }; 
}

// 带自动缓存的渲染引擎
function render(id) {
    const md = document.getElementById(id).textContent;
    const cacheKey = `nav_cache_${id}_${getDisplayLimit()}`; // 针对手机/电脑存两份，防止横竖屏布局冲突
    const mdHash = hashCode(md);
    
    let parsed = null;
    
    // 1. 尝试读取缓存
    try {
        const cachedData = localStorage.getItem(cacheKey);
        if (cachedData) {
            const parsedCache = JSON.parse(cachedData);
            if (parsedCache.hash === mdHash) {
                parsed = parsedCache.data; // 哈希一致，直接使用
            }
        }
    } catch (e) {
        console.warn("缓存读取失败，重新解析");
    }

    // 2. 如果无缓存或已过期，则重新解析并存入缓存
    if (!parsed) {
        parsed = parseMarkdown(md);
        try {
            localStorage.setItem(cacheKey, JSON.stringify({
                hash: mdHash,
                data: parsed
            }));
        } catch (e) {}
    }
    
    document.getElementById("links").innerHTML = parsed.html;
    document.getElementById("navMenu").innerHTML = parsed.navHtml;
    
    bindToggleEvents();
    bindNavEvents(); 
}

// 电脑端左侧边栏交互
function bindNavEvents() {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.group-section').forEach(sec => sec.classList.remove('active'));
            
            e.currentTarget.classList.add('active');
            const targetId = e.currentTarget.getAttribute('data-target');
            const targetElement = document.getElementById(`section-${targetId}`);
            if (targetElement) {
                targetElement.classList.add('active');
            }
            
            document.getElementById("searchInput").focus();
        });
    });
}

// 手机端折叠展开功能
function toggleGroup(btn) {
    const groupId = btn.dataset.groupId;
    const groupElement = document.getElementById(`links-${groupId}`);
    const isCollapsed = groupElement.classList.contains('collapsed');
    const totalLinks = groupElement.querySelectorAll('.link-card').length;
    
    if (isCollapsed) {
        groupElement.classList.remove('collapsed');
        btn.innerHTML = `收起`;
        btn.dataset.collapsed = 'false';
    } else {
        groupElement.classList.add('collapsed');
        btn.innerHTML = `展开 (${totalLinks} 个)`;
        btn.dataset.collapsed = 'true';
    }
}

function bindToggleEvents() {
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.removeEventListener('click', handleToggleClick); 
        btn.addEventListener('click', handleToggleClick);
    });
}
function handleToggleClick(event) {
    toggleGroup(event.currentTarget);
}

// 搜索与其他交互
function doSearch() {
    const engine = document.getElementById("engine").value;
    const keyword = document.getElementById("searchInput").value.trim();
    if (keyword) window.open(engine + encodeURIComponent(keyword), "_blank");
}

async function copyLink(url, el) {
    try {
        await navigator.clipboard.writeText(url);
        el.innerHTML = "✅";
    } catch (err) {
        el.innerHTML = "❌";
    }
    setTimeout(() => el.innerHTML = "📋", 1000);
}

function backToHome() {
    const backBtn = document.getElementById('backBtn');
    if (backBtn) backBtn.remove();
    
    render("markdown-main");
    document.getElementById("pageTitle").innerText = "我的主页";
    // 核心修复点：使用 visibility: visible 恢复原本空间
    document.getElementById("searchBar").style.visibility = "visible";  
    document.getElementById("unlockBtn").style.display = "block";
    document.body.classList.remove("secret");
    window.scrollTo({ top: 0 }); 
    
    document.getElementById("searchInput").focus();
}

function unlockSecret() {
    const pwd = prompt("请输入密码查看内容：");
    if (pwd === SECRET_PWD) {
        document.body.classList.remove(...document.body.classList); 
        render("markdown-secret");
        enterMode("私藏页面");
    } else if (pwd === PRIVATE_PWD) {
        document.body.classList.remove(...document.body.classList);
        render("markdown-private");
        enterMode("个人空间");
    } else {
        alert("密码错误！");
    }
}

function enterMode(title) {
    document.getElementById("unlockBtn").style.display = "none";
    // 核心修复点：使用 visibility: hidden 进行隐形占位，解决高度上移Bug
    document.getElementById("searchBar").style.visibility = "hidden";
    document.getElementById("pageTitle").innerText = title;
    document.body.classList.add("secret");
    window.scrollTo({ top: 0 }); 
    
    const oldBackBtn = document.getElementById('backBtn');
    if (oldBackBtn) { oldBackBtn.remove(); }
    
    const backBtn = document.createElement('button');
    backBtn.id = 'backBtn';
    backBtn.className = 'back-btn';
    backBtn.innerText = '← 返回我的主页';
    backBtn.addEventListener('click', backToHome);
    
    document.getElementById("pageTitle").parentNode.insertBefore(backBtn, document.getElementById("pageTitle").nextSibling);
}

document.addEventListener('DOMContentLoaded', () => {
    render("markdown-main");
    
    document.getElementById("searchButton").addEventListener('click', doSearch);
    document.getElementById("unlockBtn").addEventListener('click', unlockSecret);
    document.getElementById("searchInput").addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doSearch();
    });
    
    let resizeTimer;
    let lastWidth = window.innerWidth;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        if (window.innerWidth !== lastWidth) {
            lastWidth = window.innerWidth;
            resizeTimer = setTimeout(() => {
                const currentTitle = document.getElementById("pageTitle").innerText;
                if (document.body.classList.contains('secret')) {
                    if (currentTitle === "私藏页面") render("markdown-secret");
                    else if (currentTitle === "个人空间") render("markdown-private");
                } else {
                    render("markdown-main");
                }
            }, 200); 
        }
    });
});
</script>
