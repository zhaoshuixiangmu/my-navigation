<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
/* ===== 默认主题：高级大地色系 ===== */
:root {
    --bg-main: #F6F5F0;     
    --bg-card: #FFFFFF;     
    --color-text: #34433A;  
    --color-border: #E1DFD5;
    --color-link-btn: #8C7C61; 
}

* { box-sizing: border-box; } 

/* 关闭页面回弹橡皮筋效果 */
html { scroll-behavior: smooth; overscroll-behavior-y: none; } 
body { background: var(--bg-main); color: var(--color-text); font-family: Arial, sans-serif; margin: 0; padding: 0; overscroll-behavior-y: none; }

body.no-scroll { overflow: hidden; }

#unlockBtn { position: fixed; bottom: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; border: none; background: rgba(140, 124, 97, 0.3); cursor: pointer; padding: 0; z-index: 999; }
#unlockBtn:hover { background: rgba(140, 124, 97, 0.6); }

.links-group { display: grid; gap: 12px; margin-top: 10px; }
.link-card { background: var(--bg-card); border-radius: 6px; padding: 0 8px; border: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; height: 100%; box-sizing: border-box; }
.link-card a { color: inherit; text-decoration: none; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; min-width: 0; flex: 1; margin-right: 5px; }
.copy-btn { cursor: pointer; font-size: 14px; color: #A3A097; }
.copy-btn:hover { color: var(--color-link-btn); }
.links-group.collapsed .link-card.hidden-by-limit { display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* =========================================================
   布局 1：移动端优先
   ========================================================= */
.mobile-top-bar { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: var(--bg-main); z-index: 990; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--color-border); }
.mobile-top-bar .top-title { font-size: 18px; font-weight: bold; user-select: none; }
.menu-btn { background: none; border: none; color: var(--color-text); padding: 0; display: flex; align-items: center; cursor: pointer; }

body.secret #mobileAdminBtn { visibility: hidden; pointer-events: none; }

.sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(43, 45, 42, 0.4); z-index: 998; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; touch-action: none; }
.sidebar-overlay.active { opacity: 1; visibility: visible; }

.sidebar { 
    position: fixed; top: 0; bottom: 0; left: 0; 
    width: 75%; max-width: 320px; 
    background: var(--bg-card); z-index: 999; 
    transform: translateX(-105%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    padding: 40px 20px 80px 20px; 
    overflow-y: auto; box-shadow: 4px 0 15px rgba(0,0,0,0.1); 
    display: flex; flex-direction: column; 
    overscroll-behavior-y: contain; 
}
.sidebar.open { transform: translateX(0); }
.sidebar h1 { display: none; } 
.sidebar .back-btn { display: none; }

.mobile-search-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; margin-top: 10px; }
.mobile-search-bar select, .mobile-search-bar input, .mobile-search-bar button { height: 40px; border-radius: 8px; border: 1px solid var(--color-border); padding: 0 10px; font-size: 14px; background: var(--bg-main); color: var(--color-text); }
.mobile-search-bar button { background: var(--color-text); color: var(--bg-main); font-weight: bold; }

.desktop-search-bar { display: none; }

.nav-menu { display: flex; flex-direction: column; gap: 8px; }
.nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; color: var(--color-text); font-size: 15px; font-weight: bold; }
.nav-item:hover, .nav-item.active { background: rgba(140, 124, 97, 0.1); color: var(--color-link-btn); }

.layout-wrapper { display: block; padding: 66px 16px 80px; max-width: 1200px; margin: 0 auto; }
.group-section { display: none; margin-bottom: 40px; } 
.group-section.active { display: block; animation: fadeIn 0.3s ease; }

.group-header { position: sticky; top: 55px; background: var(--bg-main); z-index: 10; padding: 22px 0 10px 0; margin-top: 0; border-bottom: none; }
.group-header h2 { font-size: 16px; margin: 0; font-weight: 800; }

.toggle-btn { display: none !important; } 
.links-group { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-auto-rows: 38px; }


/* =========================================================
   布局 2：电脑端 
   ========================================================= */
@media (min-width: 850px) {
    .mobile-top-bar, .sidebar-overlay, .mobile-search-bar { display: none !important; }
    
    .layout-wrapper { display: flex; max-width: 1400px; margin: 0 auto; align-items: flex-start; padding: 0; }
    
    .sidebar { 
        position: sticky; top: 0; left: 0; transform: none; width: 220px; max-width: none; 
        height: 100vh; bottom: auto;
        overflow-y: auto; background: transparent; box-shadow: none; z-index: 1; 
        border-right: 1px solid var(--color-border); padding: 30px 20px; box-sizing: border-box; 
        display: block; overscroll-behavior-y: auto; 
    }
    
    #pageTitle { user-select: none; cursor: default; }
    
    .sidebar h1 { display: block; text-align: left; margin: 0 0 30px; font-size: 24px; }
    .sidebar .back-btn { display: block; margin: 0 0 30px 0; text-align: left; background: none; border: none; color: var(--color-link-btn); padding: 8px 16px; font-size: 14px; cursor: pointer; width: fit-content; border-radius: 4px; }
    .sidebar .back-btn:hover { background: rgba(140, 124, 97, 0.1); text-decoration: underline; }
    
    .nav-item { border-left: 3px solid transparent; font-weight: normal; }
    .nav-item.active { border-left: 3px solid var(--color-link-btn); font-weight: bold; background: rgba(140, 124, 97, 0.15); color: var(--color-link-btn); }

    .main-content { flex: 1; padding: 30px 50px; min-width: 0; }
    .desktop-search-bar { display: flex !important; justify-content: center; align-items: center; gap: 6px; margin: 0 auto 40px; max-width: 600px; }
    .desktop-search-bar select, .desktop-search-bar input, .desktop-search-bar button { height: 36px; padding: 0 10px; border: 1px solid var(--color-border); border-radius: 4px; background: var(--bg-card); color: var(--color-text); font-size: 14px; transition: all 0.3s; }
    .desktop-search-bar select, .desktop-search-bar button { flex-shrink: 0; }
    .desktop-search-bar input { flex: 1; }
    .desktop-search-bar input:focus, .desktop-search-bar select:focus { outline: none; border-color: var(--color-link-btn); }
    .desktop-search-bar button { background: var(--color-text); color: var(--bg-main); font-weight: bold; cursor: pointer; }

    .group-header { position: relative; top: 0; padding: 0; border-bottom: none; margin-top: 0; background: transparent; }
    
    .toggle-btn { display: inline-block !important; background: none; border: none; color: var(--color-link-btn); padding: 0 5px; font-size: 14px; cursor: pointer; }
    .links-group { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); grid-auto-rows: 36px; }
}

@media (min-width: 1200px) { .links-group { grid-template-columns: repeat(7, minmax(0, 1fr)); } }

/* =========================================================
   开发者后台 Modal 样式
   ========================================================= */
.admin-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(43, 45, 42, 0.7); z-index: 2000;
    display: flex; justify-content: center; align-items: center;
}
.admin-box {
    background: var(--bg-main); padding: 24px 28px; border-radius: 12px;
    width: 90%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}
.admin-box.editor-mode {
    max-width: 800px; width: 95%; height: 85vh; 
    display: flex; flex-direction: column; padding: 20px;
}
.admin-box h3 { margin: 0 0 18px; font-size: 18px; text-align: center; font-weight: bold; }
.admin-box input, .admin-box select {
    width: 100%; height: 42px; margin-bottom: 12px; border-radius: 6px; 
    border: 1px solid var(--color-border); padding: 0 12px; font-size: 14px;
    background: var(--bg-card); color: var(--color-text);
}
.admin-box input:focus, .admin-box select:focus, #editorTextarea:focus { outline: none; border-color: var(--color-link-btn); }
.admin-btn-group { display: flex; gap: 10px; margin-top: 10px; flex-shrink: 0; }
.admin-btn-group button { 
    flex: 1; height: 40px; border: none; border-radius: 6px; 
    cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s;
}
.admin-btn-group button:hover { opacity: 0.9; }
.btn-primary { background: var(--color-text); color: var(--bg-main); }
.btn-cancel { background: transparent; border: 1px solid var(--color-border) !important; color: var(--color-text); }
.reset-link { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: var(--color-link-btn); text-decoration: none; }

#editorTextarea {
    flex: 1; width: 100%; resize: none; border-radius: 6px; padding: 12px;
    border: 1px solid var(--color-border); font-family: monospace; font-size: 14px;
    background: var(--bg-card); color: var(--color-text); line-height: 1.5;
}
.editor-header { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
.editor-header select { margin-bottom: 0; flex: 1; font-weight: bold; min-width: 150px; }
#editorStatus { font-size: 12px; text-align: center; margin-top: 8px; color: var(--color-link-btn); }

/* 快捷插入工具栏样式 */
.quick-add-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.quick-add-bar input { margin-bottom: 0; flex: 1; min-width: 100px; }
.quick-add-bar button { 
    height: 42px; border: 1px solid var(--color-text); border-radius: 6px; 
    background: var(--color-text); color: var(--bg-main); cursor: pointer; 
    font-weight: bold; font-size: 13px; padding: 0 12px; flex-shrink: 0; 
}
.quick-add-bar button.btn-secondary {
    background: transparent; color: var(--color-text); 
}
</style>

## 私密资源

<script defer>
const SECRET_PWD  = "709394"; 
const PRIVATE_PWD = "abcd"; 
const MOBILE_LIMIT = 9999; 
const DESKTOP_LIMIT = 9999; 

function getDisplayLimit() { return window.innerWidth <= 850 ? MOBILE_LIMIT : DESKTOP_LIMIT; }
function hashCode(str) { let hash = 0; for (let i = 0, len = str.length; i < len; i++) { let chr = str.charCodeAt(i); hash = (hash << 5) - hash + chr; hash |= 0; } return hash.toString(); }

function parseMarkdown(md) {
    const lines = md.split("\n"); let html = "", navHtml = "", currentGroupName = "", currentLinks = [];
    const displayLimit = getDisplayLimit(); let isFirstGroup = true, groupIndex = 0; 
    function flushGroup() {
        if (!currentGroupName || currentLinks.length === 0) return;
        const groupId = `cat-${groupIndex++}`; const activeClass = isFirstGroup ? 'active' : ''; 
        navHtml += `<div class="nav-item ${activeClass}" data-target="${groupId}">${currentGroupName}</div>`;
        html += `<section class="group-section ${activeClass}" id="section-${groupId}"><div class="group-header"><h2>${currentGroupName}</h2></div>`;
        html += `<div class="links-group" id="links-${groupId}">`;
        currentLinks.forEach((m) => {
            html += `<div class="link-card"><a href="${m[2]}" target="_blank" rel="noopener noreferrer" title="${m[1]}">${m[1]}</a><span class="copy-btn" onclick="copyLink('${m[2]}', this)">📋</span></div>`;
        });
        html += `</div></section>`; currentGroupName = ""; currentLinks = []; isFirstGroup = false; 
    }
    lines.forEach(line => {
        line = line.trim(); if (!line) return;
        if (line.startsWith("##")) { flushGroup(); currentGroupName = line.replace(/^##+/, "").trim(); } 
        else if (line.startsWith("- [")) { const m = line.match(/- \[(.*?)\]\((.*?)\)/); if (m) currentLinks.push(m); }
    });
    flushGroup(); return { html, navHtml }; 
}

function render(id) {
    const md = document.getElementById(id).textContent; const cacheKey = `nav_cache_${id}_${getDisplayLimit()}`; const mdHash = hashCode(md); let parsed = null;
    try { const cachedData = localStorage.getItem(cacheKey); if (cachedData) { const parsedCache = JSON.parse(cachedData); if (parsedCache.hash === mdHash) parsed = parsedCache.data; } } catch (e) { }
    if (!parsed) { parsed = parseMarkdown(md); try { localStorage.setItem(cacheKey, JSON.stringify({ hash: mdHash, data: parsed })); } catch (e) {} }
    document.getElementById("links").innerHTML = parsed.html; document.getElementById("navMenu").innerHTML = parsed.navHtml;
    bindNavEvents(); 
}

const sidebarEl = document.getElementById('sidebar');
const overlayEl = document.getElementById('sidebarOverlay');

function openSidebar() { 
    sidebarEl.classList.add('open'); 
    overlayEl.classList.add('active'); 
    document.body.classList.add('no-scroll'); 
}
function closeSidebar() { 
    sidebarEl.classList.remove('open'); 
    overlayEl.classList.remove('active'); 
    document.body.classList.remove('no-scroll'); 
}

document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.addEventListener('click', (e) => {
    if (window.innerWidth >= 850) return; 
    if (sidebarEl.classList.contains('open')) {
        if (e.target.closest('#menuBtn') || e.target.closest('#mobileSearchBar')) return;
        closeSidebar();
    }
});

function bindNavEvents() {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); e.currentTarget.classList.add('active');
            const targetId = e.currentTarget.getAttribute('data-target'); const targetElement = document.getElementById(`section-${targetId}`);
            document.querySelectorAll('.group-section').forEach(sec => sec.classList.remove('active')); if (targetElement) targetElement.classList.add('active');
            if (window.innerWidth < 850) { window.scrollTo({ top: 0, behavior: 'smooth' }); } else { document.getElementById("searchInput").focus(); }
        });
    });
}

function doSearch(isMobile = false) {
    const prefix = isMobile ? 'm_' : ''; const engine = document.getElementById(prefix + "engine").value; const keyword = document.getElementById(prefix + "searchInput").value.trim();
    if (keyword) { window.open(engine + encodeURIComponent(keyword), "_blank"); if (isMobile) closeSidebar(); }
}

async function copyLink(url, el) { try { await navigator.clipboard.writeText(url); el.innerHTML = "✅"; } catch (err) { el.innerHTML = "❌"; } setTimeout(() => el.innerHTML = "📋", 1000); }

window.addEventListener('popstate', (event) => { backToHomeUI(); });
function backToHomeUI() {
    const backBtn = document.getElementById('backBtn'); if (backBtn) backBtn.remove();
    render("markdown-main");
    document.getElementById("pageTitle").innerText = "我的主页"; document.getElementById("mobilePageTitle").innerText = "我的主页";
    document.getElementById("searchBar").style.visibility = "visible";  document.getElementById("mobileSearchBar").style.display = "flex";  
    document.getElementById("unlockBtn").style.display = "block"; document.body.className = ''; window.scrollTo({ top: 0 }); 
    if (location.hash) history.replaceState({ page: 'home' }, "", window.location.pathname);
}

function unlockSecret() {
    const pwd = prompt("请输入密码查看内容：");
    if (pwd === SECRET_PWD) { document.body.className = ''; render("markdown-secret"); history.pushState({ page: 'secret' }, "", "#secret"); enterMode("私藏页面", "mode-secret"); } 
    else if (pwd === PRIVATE_PWD) { document.body.className = ''; render("markdown-private"); history.pushState({ page: 'private' }, "", "#private"); enterMode("个人空间", "mode-private"); } 
    else { alert("密码错误！"); }
}

function enterMode(title, modeClass) {
    document.getElementById("unlockBtn").style.display = "none"; document.getElementById("searchBar").style.visibility = "hidden"; document.getElementById("mobileSearchBar").style.display = "none"; 
    document.getElementById("pageTitle").innerText = title; document.getElementById("mobilePageTitle").innerText = title;
    document.body.classList.add("secret"); if(modeClass) document.body.classList.add(modeClass); window.scrollTo({ top: 0 }); 
    const oldBackBtn = document.getElementById('backBtn'); if (oldBackBtn) oldBackBtn.remove();
    const backBtn = document.createElement('button'); backBtn.id = 'backBtn'; backBtn.className = 'back-btn'; backBtn.innerText = '← 返回我的主页'; backBtn.addEventListener('click', () => { history.back(); });
    document.getElementById("pageTitle").parentNode.insertBefore(backBtn, document.getElementById("pageTitle").nextSibling);
}

let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, { passive: true });
document.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; touchEndY = e.changedTouches[0].screenY; handleGesture(); }, { passive: true });
function handleGesture() {
    if (window.innerWidth >= 850) return; 
    const deltaX = touchEndX - touchStartX; const deltaY = touchEndY - touchStartY;
    if (Math.abs(deltaX) > Math.abs(deltaY) + 20) {
        if (deltaX > 50 && !sidebarEl.classList.contains('open')) openSidebar();
        else if (deltaX < -50 && sidebarEl.classList.contains('open')) closeSidebar();
    }
}

/* =========================================================
   【硬核暗门】 加密管理后台与 GitHub API 可视化编辑器
========================================================= */

function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

function encryptData(text, key) { let result = ''; for(let i = 0; i < text.length; i++) { result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length)); } return utf8_to_b64(result); }
function decryptData(hash, key) { try { let str = b64_to_utf8(hash); let result = ''; for(let i = 0; i < str.length; i++) { result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length)); } return result; } catch(e) { return null; } }

let ghData = null;
let currentFullHtml = "";
let currentFileSha = "";
let currentTabId = "markdown-main";
let mdContents = { "markdown-main": "", "markdown-secret": "", "markdown-private": "" };

function showStatus(text, color = "var(--color-link-btn)") {
    const el = document.getElementById('editorStatus');
    el.innerText = text; el.style.color = color;
}

function openAdmin() {
    document.getElementById('adminModal').style.display = 'flex';
    const config = localStorage.getItem('gh_admin_config');
    if (config) {
        document.getElementById('adminSetupView').style.display = 'none';
        document.getElementById('adminEditorView').style.display = 'none';
        document.getElementById('adminLoginView').style.display = 'block';
        document.getElementById('adminBox').classList.remove('editor-mode');
        setTimeout(() => document.getElementById('loginPwd').focus(), 100);
    } else {
        document.getElementById('adminLoginView').style.display = 'none';
        document.getElementById('adminEditorView').style.display = 'none';
        document.getElementById('adminSetupView').style.display = 'block';
        document.getElementById('adminBox').classList.remove('editor-mode');
    }
}

function closeAdmin() { 
    document.getElementById('adminModal').style.display = 'none'; 
    document.getElementById('setupPwd').value = '';
    document.getElementById('loginPwd').value = '';
    document.getElementById('adminBox').classList.remove('editor-mode');
}

function saveAdminConfig() {
    const pwd = document.getElementById('setupPwd').value.trim(), user = document.getElementById('setupUser').value.trim(), repo = document.getElementById('setupRepo').value.trim(), token = document.getElementById('setupToken').value.trim();
    if (!pwd || !user || !repo || !token) return alert("各项参数不能为空！");
    const rawData = JSON.stringify({ user, repo, token }), encryptedText = encryptData(rawData, pwd);
    localStorage.setItem('gh_admin_config', encryptedText);
    alert("配置已加密并安全保存在本地！");
    closeAdmin();
}

function resetAdminConfig() { if(confirm("清除浏览器里的 GitHub 配置？")) { localStorage.removeItem('gh_admin_config'); openAdmin(); } }

function verifyAdmin() {
    const pwd = document.getElementById('loginPwd').value.trim();
    if(!pwd) return;
    const hash = localStorage.getItem('gh_admin_config');
    const decryptedText = decryptData(hash, pwd);
    if (decryptedText && decryptedText.includes('token')) {
        ghData = JSON.parse(decryptedText);
        document.getElementById('adminLoginView').style.display = 'none';
        document.getElementById('adminEditorView').style.display = 'flex';
        document.getElementById('adminBox').classList.add('editor-mode');
        fetchFromGitHub();
    } else {
        alert("密码错误！"); document.getElementById('loginPwd').value = '';
    }
}

async function fetchFromGitHub() {
    showStatus("📡 正在连接 GitHub 拉取源代码...");
    document.getElementById("editorTextarea").disabled = true;
    
    try {
        const url = `https://api.github.com/repos/${ghData.user}/${ghData.repo}/contents/index.html`;
        const res = await fetch(url, { headers: { "Authorization": `token ${ghData.token}`, "Accept": "application/vnd.github.v3+json" } });
        
        if (!res.ok) throw new Error("获取失败，请检查仓库名或 Token 权限！");
        
        const data = await res.json();
        currentFileSha = data.sha;
        currentFullHtml = b64_to_utf8(data.content.replace(/\n/g, ''));
        
        ['markdown-main', 'markdown-secret', 'markdown-private'].forEach(id => {
            const regex = new RegExp(`(<script id="${id}" type="text\\/plain">)([\\s\\S]*?)(<\\/script>)`);
            const match = currentFullHtml.match(regex);
            if (match) mdContents[id] = match[2].trim();
        });

        document.getElementById("editorTextarea").disabled = false;
        currentTabId = "markdown-main"; 
        document.getElementById("editorSelect").value = currentTabId;
        document.getElementById("editorTextarea").value = mdContents[currentTabId]; 
        
        showStatus("✅ 拉取成功，可以开始编辑了！", "#34433A");
        
    } catch (err) {
        showStatus("❌ " + err.message, "red");
    }
}

function switchEditorTab() {
    mdContents[currentTabId] = document.getElementById("editorTextarea").value;
    currentTabId = document.getElementById("editorSelect").value;
    document.getElementById("editorTextarea").value = mdContents[currentTabId];
}

function insertAtCursor(textarea, textToInsert) {
    const startPos = textarea.selectionStart;
    const endPos = textarea.selectionEnd;
    const text = textarea.value;
    textarea.value = text.substring(0, startPos) + textToInsert + text.substring(endPos, text.length);
    textarea.selectionStart = startPos + textToInsert.length;
    textarea.selectionEnd = startPos + textToInsert.length;
    textarea.focus();
}

function insertQuickLink() {
    const nameEl = document.getElementById('quickName');
    const urlEl = document.getElementById('quickUrl');
    let name = nameEl.value.trim();
    let url = urlEl.value.trim();
    
    if(!name || !url) {
        alert("请输入网站名称和网址！");
        return;
    }
    
    if(!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
    }
    
    const mdStr = `- [${name}](${url})\n`;
    const textarea = document.getElementById('editorTextarea');
    
    insertAtCursor(textarea, mdStr);
    
    nameEl.value = '';
    urlEl.value = '';
}

function insertQuickCategory() {
    const name = prompt("请输入新分类名称：");
    if(name && name.trim()) {
        const mdStr = `\n## ${name.trim()}\n`;
        const textarea = document.getElementById('editorTextarea');
        insertAtCursor(textarea, mdStr);
    }
}

async function pushToGitHub() {
    mdContents[currentTabId] = document.getElementById("editorTextarea").value;
    
    const pushBtn = document.getElementById("pushBtn");
    pushBtn.disabled = true; pushBtn.innerText = "打包推送中...";
    showStatus("🔄 正在将修改注入 HTML 并推送至 GitHub...");

    try {
        let newHtml = currentFullHtml;
        ['markdown-main', 'markdown-secret', 'markdown-private'].forEach(id => {
            const regex = new RegExp(`(<script id="${id}" type="text\\/plain">)([\\s\\S]*?)(<\\/script>)`);
            newHtml = newHtml.replace(regex, `$1\n${mdContents[id]}\n$3`);
        });

        const contentBase64 = utf8_to_b64(newHtml);
        const url = `https://api.github.com/repos/${ghData.user}/${ghData.repo}/contents/index.html`;
        
        const res = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${ghData.token}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Update bookmarks via Visual Editor",
                content: contentBase64,
                sha: currentFileSha
            })
        });

        if (!res.ok) throw new Error((await res.json()).message);
        
        alert("🎉 推送成功！受 CDN 缓存影响，大约 10~30 秒后刷新网页即可看到更新。");
        closeAdmin();
        
    } catch (err) {
        showStatus("❌ 推送失败: " + err.message, "red");
    } finally {
        pushBtn.disabled = false; pushBtn.innerText = "🚀 保存并推送到 GitHub";
    }
}

let pressTimer;
const titleEl = document.getElementById('pageTitle');
titleEl.addEventListener('mousedown', (e) => { if (e.button !== 0) return; pressTimer = setTimeout(() => { openAdmin(); }, 3000); });
titleEl.addEventListener('mouseup', () => clearTimeout(pressTimer));
titleEl.addEventListener('mouseleave', () => clearTimeout(pressTimer));

const mobileAdminBtn = document.getElementById('mobileAdminBtn');
if(mobileAdminBtn) mobileAdminBtn.addEventListener('click', openAdmin);

document.addEventListener('DOMContentLoaded', () => {
    if (location.hash) { history.replaceState({ page: 'home' }, "", window.location.pathname); } 
    else if (!history.state) { history.replaceState({ page: 'home' }, "", ""); }
    render("markdown-main");
    document.getElementById("searchButton").addEventListener('click', () => doSearch(false));
    document.getElementById("searchInput").addEventListener('keypress', (e) => { if (e.key === 'Enter') doSearch(false); });
    document.getElementById("m_searchButton").addEventListener('click', () => doSearch(true));
    document.getElementById("m_searchInput").addEventListener('keypress', (e) => { if (e.key === 'Enter') doSearch(true); });
    document.getElementById("unlockBtn").addEventListener('click', unlockSecret);
    document.getElementById("loginPwd").addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyAdmin(); });

    let resizeTimer, lastWidth = window.innerWidth;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        if (window.innerWidth !== lastWidth) {
            lastWidth = window.innerWidth;
            
            if (window.innerWidth >= 850) {
                document.body.classList.remove('no-scroll');
            }
            
            resizeTimer = setTimeout(() => {
                const currentTitle = document.getElementById("pageTitle").innerText;
                if (document.body.classList.contains('secret')) {
                    if (currentTitle === "私藏页面") render("markdown-secret");
                    else if (currentTitle === "个人空间") render("markdown-private");
                } else render("markdown-main");
            }, 200); 
        }
    });
});
