<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
/* ===== 默认主题：高级大地色系 ===== */
:root {
    --bg-main: #F6F5F0;     
    --bg-card: #FFFFFF;     
    --color-text: #34433A;  
    --color-border: #E1DFD5;
    --color-border-light: rgba(225, 223, 213, 0.5); /* 骨架感：通透的半透明分隔线 */
    --color-link-btn: #8C7C61; 
    --color-active-bg: #EDEBE0; /* 激活时独立小方块的浅色大地色底色 */
}

/* 彻底干掉点击时的默认灰色暗影 */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } 

/* 开启手机原生下拉刷新功能 */
html { scroll-behavior: smooth; overscroll-behavior-y: auto; } 
body { background: var(--bg-main); color: var(--color-text); font-family: Arial, sans-serif; margin: 0; padding: 0; overscroll-behavior-y: auto; }

body.no-scroll { overflow: hidden; }

/* 隐藏页解密入口小圆点 */
#unlockBtn { position: fixed; bottom: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; border: none; background: rgba(140, 124, 97, 0.3); cursor: pointer; padding: 0; z-index: 999; }
#unlockBtn:hover { background: rgba(140, 124, 97, 0.6); }

.links-group { display: grid; gap: 12px; margin-top: 10px; }
/* 卡片圆角及按压反馈 */
.link-card { background: var(--bg-card); border-radius: 6px; padding: 0 6px 0 10px; border: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; height: 100%; box-sizing: border-box; transition: transform 0.1s ease, background 0.2s; }
.link-card:hover { background: #FAF9F6; }
.link-card:active { transform: scale(0.96); } 

.link-card a { color: inherit; text-decoration: none; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; min-width: 0; flex: 1; margin-right: 5px; outline: none; }

/* 极简矢量复制按钮样式 */
.copy-btn { cursor: pointer; color: #BCB9B1; display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 4px; transition: all 0.2s; }
.copy-btn:hover { color: var(--color-link-btn); background: rgba(140, 124, 97, 0.1); }
.copy-btn:active { transform: scale(0.85); }

.links-group.collapsed .link-card.hidden-by-limit { display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

/* =========================================================
   布局 1：移动端优先
   ========================================================= */
.mobile-top-bar { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: var(--bg-main); z-index: 990; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--color-border); }
.mobile-top-bar .top-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: bold; user-select: none; white-space: nowrap; }

.menu-btn { background: none; border: none; color: var(--color-text); padding: 0; display: flex; align-items: center; cursor: pointer; }

body.secret #mobileAdminBtn { display: none !important; }

.sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(43, 45, 42, 0.4); z-index: 998; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; touch-action: none; will-change: opacity; }
.sidebar-overlay.active { opacity: 1; visibility: visible; }

.sidebar { 
    position: fixed; top: 0; bottom: 0; left: 0; 
    width: 75%; max-width: 320px; 
    background: var(--bg-main); z-index: 999; 
    transform: translateX(-105%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    padding: 40px 20px 80px 20px; /* 舒展的 20px 缓冲边距 */
    overflow-y: auto; box-shadow: 4px 0 15px rgba(0,0,0,0.1); 
    display: flex; flex-direction: column; 
    overscroll-behavior-y: contain; 
    will-change: transform;
}
.sidebar.open { transform: translateX(0); }
.sidebar h1 { display: none; } 
.sidebar .back-btn { display: none; }

/* 移动端搜索栏像素级对齐线 */
.mobile-search-bar { 
    display: flex; flex-direction: column; gap: 10px; 
    margin-bottom: 24px; margin-top: 10px; width: auto; 
    margin-left: -4px; margin-right: -4px; 
    box-sizing: border-box; position: relative;
}
.mobile-custom-select-trigger {
    width: 100%; height: 40px; border-radius: 8px; 
    border: 1px solid var(--color-border); padding: 0 14px; 
    font-size: 14px; background: var(--bg-card); color: var(--color-text);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-weight: bold;
}
.mobile-custom-select-trigger .arrow-icon {
    font-size: 12px; color: #BCB9B1; font-style: normal;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), color 0.25s ease;
    display: inline-block; transform: rotate(0deg);
}
/* 手机端点击唤醒状态：小箭头顺时针旋转90°并高亮变色 */
.mobile-search-bar.dropdown-open .mobile-custom-select-trigger .arrow-icon {
    transform: rotate(90deg); color: var(--color-link-btn);
}

/* 移动端定制一体化大地色引擎列表浮窗 */
.mobile-custom-dropdown-options {
    position: absolute; top: 44px; left: 0; right: 0;
    background: var(--bg-card); border: 1px solid var(--color-border);
    border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    z-index: 1000; padding: 4px; display: none; flex-direction: column; gap: 2px;
    max-height: 280px; overflow-y: auto; /* 保证选项增多时能够优雅滚动且不爆框 */
}
.mobile-custom-dropdown-options div {
    padding: 10px 12px; font-size: 14px; color: var(--color-text);
    font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s;
}
.mobile-custom-dropdown-options div.active {
    background: var(--color-active-bg);
    color: var(--color-link-btn);
}

.mobile-search-bar input, .mobile-search-bar button { 
    width: 100%; height: 40px; border-radius: 8px; 
    border: 1px solid var(--color-border); padding: 0 12px; 
    font-size: 14px; background: var(--bg-card); color: var(--color-text);
    outline: none; box-sizing: border-box; display: block;
}
.mobile-search-bar input:focus { border-color: var(--color-link-btn); }
.mobile-search-bar button { background: var(--color-text); color: var(--bg-main); font-weight: bold; transition: transform 0.1s; border: none; cursor: pointer;}
.mobile-search-bar button:active { transform: scale(0.97); }

.desktop-search-bar { display: none; }

/* 树状手风琴菜单基础结构 */
.nav-menu { display: flex; flex-direction: column; gap: 2px; user-select: none; -webkit-user-select: none; width: 100%; }
.nav-parent-group { display: flex; flex-direction: column; width: 100%; }

.nav-item.parent-toggle, .nav-item.flat-item { 
    padding: 12px 14px; cursor: pointer; color: var(--color-text); 
    font-size: 15px; font-weight: bold; transition: all 0.2s ease; 
    display: flex; justify-content: space-between; align-items: center; width: 100%;
    background: transparent; border-radius: 0;
}
.nav-item.parent-toggle:hover, .nav-item.flat-item:hover { background: transparent; color: var(--color-link-btn); }
.nav-item.parent-toggle::after { content: '▸'; font-size: 12px; color: #BCB9B1; transition: transform 0.2s; }
.nav-parent-group.open .nav-item.parent-toggle::after { transform: rotate(90deg); color: var(--color-link-btn); }
.nav-parent-group.open .nav-item.parent-toggle { color: var(--color-link-btn); }

.nav-item.flat-item.active { background: transparent; color: var(--color-link-btn); font-weight: 800; }

.nav-sub-menu { 
    display: none; flex-direction: column; gap: 2px; 
    padding: 2px 0 6px 14px; width: 100%; 
    background: transparent; 
}
.nav-parent-group.open .nav-sub-menu { display: flex; animation: fadeIn 0.15s ease; }

.nav-sub-item { 
    padding: 10px 14px; cursor: pointer; color: var(--color-text); 
    font-size: 14px; opacity: 0.85; transition: all 0.2s ease; width: 100%;
    font-weight: bold; background: transparent; border-radius: 0;
}
.nav-sub-item:hover { background: transparent; opacity: 1; color: var(--color-link-btn); }

/* 完美的极简纯文字激活样式 */
.nav-sub-item.active { 
    background: transparent; 
    color: var(--color-link-btn); 
    font-weight: 800; 
    opacity: 1; 
}

@media (max-width: 849px) {
    body.mode-secret .sidebar { padding-bottom: 24px; }
    body.mode-secret .nav-menu { margin-top: auto; display: flex; flex-direction: column-reverse; }
}

.layout-wrapper { display: block; padding: 66px 16px 80px; max-width: 1200px; margin: 0 auto; }
.group-section { display: none; margin-bottom: 40px; } 
.group-section.active { display: block; animation: fadeIn 0.3s ease; }

/* 开启硬件加速提效主内容区 */
.group-section.active .link-card { will-change: transform, opacity; }

.group-header { position: sticky; top: 55px; background: var(--bg-main); z-index: 10; padding: 22px 0 10px 0; margin-top: 0; border-bottom: none; }
.group-header h2 { font-size: 16px; margin: 0; font-weight: 800; display: flex; align-items: center; gap: 6px; }

/* 全双端对齐：子分类标记颜色 */
.group-header h2 .sub-title-mark { font-size: 14px; font-weight: normal; color: var(--color-link-btn); opacity: 0.9; margin-left: 4px; }

.toggle-btn { display: none !important; } 
.links-group { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); grid-auto-rows: 38px; }


/* =========================================================
   布局 2：电脑端精修版（经典 Google 胶囊组 + 锁死 7 列） 
   ========================================================= */
@media (min-width: 850px) {
    .mobile-top-bar, .sidebar-overlay, .mobile-search-bar { display: none !important; }
    
    .layout-wrapper { display: flex; max-width: 1400px; margin: 0 auto; align-items: flex-start; padding: 0; }
    
    /* 1. 左侧侧边栏高级骨架感 */
    .sidebar { 
        position: sticky; top: 0; left: 0; transform: none; width: 240px; max-width: none; 
        height: 100vh; bottom: auto; display: block; overscroll-behavior-y: auto; z-index: 1; 
        padding: 40px 24px; box-sizing: border-box; background: transparent; box-shadow: none;
        border-right: 1px solid var(--color-border-light); 
    }
    
    #pageTitle { user-select: none; cursor: default; font-weight: bold; }
    .sidebar h1 { display: block; text-align: left; margin: 0 0 32px; font-size: 24px; }
    
    .sidebar .back-btn { display: block; margin: 0 0 30px 0; text-align: left; background: none; border: none; color: var(--color-link-btn); padding: 8px 16px; font-size: 14px; cursor: pointer; width: fit-content; border-radius: 4px; transition: transform 0.1s;}
    .sidebar .back-btn:hover { background: rgba(140, 124, 97, 0.1); text-decoration: underline; }
    .sidebar .back-btn:active { transform: scale(0.95); }

    .nav-item.parent-toggle, .nav-item.flat-item, .nav-sub-item {
        transition: background 0.25s cubic-bezier(0.4, 0, 0.2, 1), color 0.25s ease, opacity 0.25s ease;
    }

    .main-content { flex: 1; padding: 40px 60px; min-width: 0; }
    
    /* 💻 电脑端隐藏页卡片整体下移专用样式：预留顶部充足呼吸空间，防止布局顶头太高 */
    body.secret .main-content { 
        padding-top: 120px; 
    }
    
    /* 2. 经典 Google 胶囊组合 */
    .desktop-search-bar { 
        display: flex; justify-content: center; align-items: center; gap: 0; 
        margin: 0 auto 48px; max-width: 660px; 
        background: var(--bg-card); border: 1px solid var(--color-border);
        border-radius: 24px; padding: 2px 6px; box-sizing: border-box;
        box-shadow: 0 2px 10px rgba(52, 67, 58, 0.03); 
        position: relative; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .desktop-search-bar:focus-within {
        border-color: var(--color-link-btn);
        box-shadow: 0 4px 16px rgba(140, 124, 97, 0.12);
    }
    
    /* 去原生化定制下拉皮肤 */
    .desktop-custom-select-trigger {
        flex-shrink: 0; padding: 0 12px 0 20px; height: 38px;
        display: flex; align-items: center; gap: 4px;
        cursor: pointer; color: var(--color-link-btn); font-weight: bold; font-size: 14px;
        user-select: none; -webkit-user-select: none;
    }
    .desktop-custom-select-trigger::after {
        content: '▸'; font-size: 11px; color: #BCB9B1; display: inline-block;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .desktop-search-bar.pc-dropdown-open .desktop-custom-select-trigger::after {
        transform: rotate(90deg);
    }

    /* 电脑端一体式气泡浮窗 */
    .desktop-custom-dropdown-options {
        position: absolute; top: 46px; left: 16px; width: 140px;
        background: var(--bg-card); border: 1px solid var(--color-border);
        border-radius: 12px; box-shadow: 0 6px 20px rgba(52, 67, 58, 0.1);
        z-index: 1000; padding: 6px; display: none; flex-direction: column; gap: 3px;
        animation: fadeIn 0.18s ease;
        max-height: 280px; overflow-y: auto; /* 保证选项增多时能够优雅滚动且不爆框 */
    }
    .desktop-custom-dropdown-options div {
        padding: 8px 12px; font-size: 14px; color: var(--color-text);
        font-weight: bold; border-radius: 6px; cursor: pointer;
        transition: background 0.25s cubic-bezier(0.4, 0, 0.2, 1), color 0.25s ease;
    }
    .desktop-custom-dropdown-options div:hover {
        background: rgba(140, 124, 97, 0.05);
    }
    .desktop-custom-dropdown-options div.active {
        background: var(--color-active-bg);
        color: var(--color-link-btn);
    }

    .desktop-search-bar input { 
        flex: 1; height: 38px; border: none !important; background: transparent !important;
        color: var(--color-text); font-size: 14px; padding: 0 16px; outline: none !important;
    }
    .desktop-search-bar button { 
        flex-shrink: 0; height: 38px; border: none !important; background: transparent !important;
        padding: 0 20px; font-weight: bold; cursor: pointer; color: var(--color-link-btn); font-size: 14px;
    }
    .desktop-search-bar button:hover { opacity: 0.8; }

    /* 4. 灰阶文字杂志级层次视差 */
    .group-header { position: relative; top: 0; padding: 0; border-bottom: none; margin-top: 0; background: transparent; margin-bottom: 16px; }
    .group-header h2 { font-size: 16px; font-weight: 800; color: var(--color-text); letter-spacing: 0.5px;}
    
    /* 🛠️ 电脑端灰阶层次同步切换为复古金 */
    .group-header h2 .sub-title-mark { font-size: 14px; font-weight: 500; color: var(--color-link-btn); margin-left: 6px; opacity: 0.9; }
    
    .toggle-btn { display: inline-block !important; background: none; border: none; color: var(--color-link-btn); padding: 0; font-size: 14px; cursor: pointer; }
    
    /* 中等屏幕自适应退防规格 */
    .links-group { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); grid-auto-rows: 36px; }

    /* 电脑端复制按钮悬停滑出 */
    .copy-btn { opacity: 0; transform: translateX(5px); pointer-events: none; transition: all 0.2s ease; }
    .link-card:hover .copy-btn { opacity: 1; transform: translateX(0); pointer-events: auto; }

    /* 后台全屏铺满适配 */
    .admin-box.editor-mode { max-width: 1000px !important; padding: 30px 40px !important; }
    .quick-add-card { flex-direction: row !important; align-items: center; padding: 16px 20px !important; gap: 16px !important;}
    .quick-add-card .flex-row { flex: 1; gap: 12px !important; }
    .editor-header select { height: 42px !important; font-size: 15px; }
    .editor-header button { height: 42px !important; padding: 0 24px !important; }
}

/* 🛠️ 大显示器下，锁死为 7 列 */
@media (min-width: 1200px) { 
    .links-group { grid-template-columns: repeat(7, minmax(0, 1fr)); } 
}

/* 💻 电脑端隐藏页面：瞬间隐藏且停用任何缓动过渡，达到零毫秒瞬间关闭搜索栏的效果 */
body.secret .desktop-search-bar {
    display: none !important;
    transition: none !important;
}

/* =========================================================
   【统一皮肤】开发者配置 / 主题信封化解密弹窗 Modal 
   ========================================================= */
.admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(52, 67, 58, 0.5); z-index: 2000; display: flex; justify-content: center; align-items: center; }
.admin-box { background: var(--bg-main); padding: 24px 28px; border-radius: 12px; width: 90%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: all 0.3s ease; border: 1px solid var(--color-border); }

.mask-pwd { -webkit-text-security: disc; text-security: disc; }

.admin-box h3 { margin: 0 0 18px; font-size: 16px; text-align: center; font-weight: 800; color: var(--color-text); }
.admin-box input, .admin-box select { width: 100%; height: 42px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--color-border); padding: 0 12px; font-size: 14px; background: var(--bg-card); color: var(--color-text); outline: none; }
.admin-box input:focus, .admin-box select:focus, #editorTextarea:focus { border-color: var(--color-link-btn); }
.admin-btn-group { display: flex; gap: 10px; margin-top: 10px; flex-shrink: 0; }
.admin-btn-group button { flex: 1; height: 40px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s, transform 0.1s; }
.admin-btn-group button:hover { opacity: 0.9; }
.admin-btn-group button:active { transform: scale(0.96); }
.btn-primary { background: var(--color-text); color: var(--bg-main); }
.btn-cancel { background: transparent; border: 1px solid var(--color-border) !important; color: var(--color-text); }
.reset-link { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: var(--color-link-btn); text-decoration: none; }

/* 编辑器布局 */
.admin-box.editor-mode { max-width: 800px; width: 95%; height: 85vh; display: flex; flex-direction: column; padding: 20px; }
.editor-header { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.editor-header select { margin-bottom: 0; flex: 1; font-weight: bold; min-width: 150px; height: 42px; border-radius: 6px; border: 1px solid var(--color-border); }
.editor-header button { height: 42px; padding: 0 16px; border-radius: 6px; }

/* 智能快捷添加控制台 */
.quick-add-card { background: rgba(140, 124, 97, 0.05); border: 1px dashed var(--color-border); padding: 12px; border-radius: 6px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.quick-add-card .flex-row { display: flex; gap: 8px; }
.quick-add-card input, .quick-add-card select { margin-bottom: 0; height: 38px; border-radius: 4px; font-size: 14px; flex: 1; min-width: 0; border: 1px solid var(--color-border); padding: 0 10px; background: var(--bg-card); }
.quick-add-card .btn-insert { height: 38px; background: var(--color-text); color: var(--bg-main); border: none; border-radius: 4px; cursor: pointer; font-weight: bold; padding: 0 12px; white-space: nowrap; transition: transform 0.1s;}
.quick-add-card .btn-insert:active { transform: scale(0.96); }
.quick-add-card .btn-newcat { height: 38px; background: transparent; border: 1px solid var(--color-border); border-radius: 4px; cursor: pointer; padding: 0 12px; color: var(--color-text); transition: transform 0.1s;}
.quick-add-card .btn-newcat:active { transform: scale(0.96); }

.textarea-title { font-size: 12px; color: var(--color-link-btn); margin-bottom: 4px; font-weight: bold; flex-shrink: 0;}
#editorTextarea { flex: 1; width: 100%; min-height: 0; resize: none; border-radius: 6px; padding: 12px; border: 1px solid var(--color-border); font-family: monospace; font-size: 14px; background: var(--bg-card); color: var(--color-text); line-height: 1.5; margin-bottom: 0; }
#editorStatus { font-size: 12px; text-align: center; margin-top: 10px; color: var(--color-link-btn); font-weight: bold; flex-shrink: 0;}

@media (max-width: 849px) {
    .admin-modal { padding: 0; }
    .admin-box.editor-mode { width: 100vw; height: 100dvh; max-height: 100dvh; max-width: 100vw; border-radius: 0; padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); padding-bottom: max(16px, env(safe-area-inset-bottom)); }
}

</style>
</head>
<body>

<div class="mobile-top-bar" id="mobileTopBar">
    <button class="menu-btn" id="menuBtn">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

const ICON_COPY = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
const ICON_CHECK = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="#5C8D73" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
const ICON_ERR = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="#D97A7A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

function getDisplayLimit() { return window.innerWidth <= 850 ? MOBILE_LIMIT : DESKTOP_LIMIT; }

// ===== 智能架构树生成 =====
function parseMarkdown(md) {
    const lines = md.split("\n");
    let html = ""; let navHtml = "";
    let currentParent = null; let currentSub = null;    
    let parentIndex = 0; let subIndex = 0;
    let tree = [];

    lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        if (line.startsWith("##") && !line.startsWith("###")) {
            currentParent = { name: line.replace(/^##\s*/, "").trim(), id: `p-${parentIndex++}`, subs: [], links: [] };
            currentSub = null;
            tree.push(currentParent);
        } else if (line.startsWith("###")) {
            if (!currentParent) return; 
            currentSub = { name: line.replace(/^###\s*/, "").trim(), id: `s-${subIndex++}`, links: [] };
            currentParent.subs.push(currentSub);
        } else if (line.startsWith("- [")) {
            const m = line.match(/- \[(.*?)\]\((.*?)\)/);
            if (m) {
                if (currentSub) { currentSub.links.push(m); } 
                else if (currentParent) { currentParent.links.push(m); }
            }
        }
    });

    let isFirstNodeActivated = false;

    tree.forEach((p) => {
        const hasSubCategories = p.subs.length > 0;
        
        if (hasSubCategories) {
            const shouldOpen = !isFirstNodeActivated ? 'open' : '';
            navHtml += `<div class="nav-parent-group ${shouldOpen}" id="nav-group-${p.id}">`;
            navHtml += `<div class="nav-item parent-toggle" onclick="toggleNavGroup('${p.id}')">${p.name}</div>`;
            navHtml += `<div class="nav-sub-menu">`;
            
            if (p.links.length > 0) {
                const isActive = !isFirstNodeActivated ? 'active' : '';
                isFirstNodeActivated = true;
                navHtml += `<div class="nav-sub-item ${isActive}" data-target="${p.id}" onclick="activeSubItem(this)">全部内容</div>`;
            }
            p.subs.forEach((s) => {
                const isActive = !isFirstNodeActivated ? 'active' : '';
                isFirstNodeActivated = true;
                navHtml += `<div class="nav-sub-item ${isActive}" data-target="${s.id}" onclick="activeSubItem(this)">${s.name}</div>`;
            });
            navHtml += `</div></div>`;
        } else {
            const isActive = !isFirstNodeActivated ? 'active' : '';
            if (!isFirstNodeActivated) isFirstNodeActivated = true;
            navHtml += `<div class="nav-item flat-item ${isActive}" id="flat-item-${p.id}" data-target="${p.id}" onclick="activeFlatItem(this)">${p.name}</div>`;
        }

        if (p.links.length > 0) {
            const activeClass = html === "" ? 'active' : '';
            html += `<section class="group-section ${activeClass}" id="section-${p.id}">
                        <div class="group-header"><h2>${p.name}</h2></div>
                        <div class="links-group">`;
            p.links.forEach(m => {
                html += `<div class="link-card" data-name="${m[1].toLowerCase()}"><a href="${m[2]}" target="_blank" rel="noopener noreferrer" title="${m[1]}">${m[1]}</a><span class="copy-btn" onclick="copyLink('${m[2]}', this)">${ICON_COPY}</span></div>`;
            });
            html += `</div></section>`;
        }

        p.subs.forEach((s) => {
            const activeClass = html === "" ? 'active' : '';
            html += `<section class="group-section ${activeClass}" id="section-${s.id}">
                        <div class="group-header"><h2>${p.name} <span class="sub-title-mark">/ ${s.name}</span></h2></div>
                        <div class="links-group">`;
            s.links.forEach(m => {
                html += `<div class="link-card" data-name="${m[1].toLowerCase()}"><a href="${m[2]}" target="_blank" rel="noopener noreferrer" title="${m[1]}">${m[1]}</a><span class="copy-btn" onclick="copyLink('${m[2]}', this)">${ICON_COPY}</span></div>`;
            });
            html += `</div></section>`;
        });
    });

    return { html, navHtml }; 
}

function render(id) {
    const md = document.getElementById(id).textContent;
    let parsed = parseMarkdown(md);
    document.getElementById("links").innerHTML = parsed.html; 
    document.getElementById("navMenu").innerHTML = parsed.navHtml;
    resetSearchState();
}

// 性能优化：搜索框硬件级防抖封装
let searchDebounceTimer;
function debounceFilter(val) {
    // 🔍 修复交互漏洞：若当前选择的不是“站内书签(local)”，直接拦截并退出，不触发任何本地书签过滤
    if (currentSelectedEngineValue !== 'local') return;
    
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
        doLocalFilter(val);
    }, 80); 
}

// 性能优化：精准洗牌 DOM，消除重排产生的顿挫感
function doLocalFilter(val) {
    const keyword = val.trim().toLowerCase();
    
    if (!keyword) {
        const activeSub = document.querySelector('.nav-sub-item.active');
        const activeFlat = document.querySelector('.nav-item.flat-item.active');
        const activeEl = activeSub || activeFlat;
        
        document.querySelectorAll('.group-section').forEach(sec => sec.classList.remove('active'));
        if (activeEl) {
            const targetId = activeEl.getAttribute('data-target');
            const currentSec = document.getElementById(`section-${targetId}`);
            if (currentSec) currentSec.classList.add('active');
        } else {
            const firstSec = document.querySelector('.group-section');
            if (firstSec) firstSec.classList.add('active');
        }
        document.querySelectorAll('.link-card').forEach(card => {
            if(card.style.display !== 'flex') card.style.display = 'flex';
        });
        return;
    }

    document.querySelectorAll('.group-section').forEach(section => {
        let hasMatch = false;
        const cards = section.querySelectorAll('.link-card');
        
        cards.forEach(card => {
            const name = card.getAttribute('data-name') || '';
            if (name.includes(keyword)) {
                if(card.style.display !== 'flex') card.style.display = 'flex';
                hasMatch = true;
            } else {
                if(card.style.display !== 'none') card.style.display = 'none';
            }
        });

        if (hasMatch) {
            section.classList.add('active');
        } else {
            section.classList.remove('active');
        }
    });
}

// 搜索主控 logic：支持站内检索和跳转外部引擎
function doSearch(isMobile) {
    const inputId = isMobile ? "m_searchInput" : "searchInput";
    const val = document.getElementById(inputId).value.trim();
    if (currentSelectedEngineValue === "local") {
        doLocalFilter(val);
    } else {
        if (val) {
            window.open(currentSelectedEngineValue + encodeURIComponent(val), "_blank");
        }
    }
}

function toggleNavGroup(id) {
    const targetGroup = document.getElementById(`nav-group-${id}`);
    const isOpen = targetGroup.classList.contains('open');
    document.querySelectorAll('.nav-parent-group').forEach(g => g.classList.remove('open'));
    document.querySelectorAll('.nav-item.flat-item').forEach(i => i.classList.remove('active'));
    
    if (!isOpen) targetGroup.classList.add('open');
}

// 二级分类点击后手机端侧边栏即刻缩回
function activeSubItem(el) {
    clearSearchInputs();
    document.querySelectorAll('.nav-sub-item').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.nav-item.flat-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    
    const targetId = el.getAttribute('data-target');
    const targetElement = document.getElementById(`section-${targetId}`);
    document.querySelectorAll('.group-section').forEach(sec => sec.classList.remove('active'));
    if (targetElement) targetElement.classList.add('active');
    
    document.querySelectorAll('.link-card').forEach(card => {
        if(card.style.display !== 'flex') card.style.display = 'flex';
    });
    
    if (window.innerWidth < 850) { 
        closeSidebar(); 
    } else { 
        document.getElementById("searchInput").focus(); 
    }
}

function activeFlatItem(el) {
    clearSearchInputs();
    document.querySelectorAll('.nav-sub-item').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.nav-parent-group').forEach(g => g.classList.remove('open'));
    document.querySelectorAll('.nav-item.flat-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    
    const targetId = el.getAttribute('data-target');
    const targetElement = document.getElementById(`section-${targetId}`);
    document.querySelectorAll('.group-section').forEach(sec => sec.classList.remove('active'));
    if (targetElement) targetElement.classList.add('active');
    
    document.querySelectorAll('.link-card').forEach(card => {
        if(card.style.display !== 'flex') card.style.display = 'flex';
    });
    
    if (window.innerWidth < 850) { 
        closeSidebar();
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    } else { 
        document.getElementById("searchInput").focus(); 
    }
}

function clearSearchInputs() {
    document.getElementById('searchInput').value = '';
    document.getElementById('m_searchInput').value = '';
}

// ===== 🛠️ 移动端定制皮肤化下拉引擎交互 =====
function toggleMobileEngineDropdown(e) {
    e.stopPropagation();
    const bar = document.getElementById('mobileSearchBar');
    const optionsPanel = document.getElementById('m_selectOptions');
    const isShowing = optionsPanel.style.display === 'flex';
    
    if (isShowing) {
        optionsPanel.style.display = 'none';
        bar.classList.remove('dropdown-open');
    } else {
        optionsPanel.style.display = 'flex';
        bar.classList.add('dropdown-open');
    }
}

function selectMobileEngine(val, name) {
    currentSelectedEngineValue = val;
    document.getElementById('m_selectTrigger').innerHTML = `${name} <i class="arrow-icon">▸</i>`;
    
    const input = document.getElementById('m_searchInput');
    input.placeholder = val === 'local' ? "搜索站内书签..." : "搜索网络...";
    input.value = '';
    
    document.querySelectorAll('#m_selectOptions div').forEach(div => {
        if(div.getAttribute('data-value') === val) div.classList.add('active');
        else div.classList.remove('active');

    document.getElementById('m_selectOptions').style.display = 'none';

// ===== 🛠️ 电脑端定制一体式气泡下拉列表交互机制 =====
function toggleDesktopEngineDropdown(e) {
    e.stopPropagation();

    document.querySelectorAll('#pc_selectOptions div').forEach(div => {

    document.getElementById('pc_selectTrigger').innerText = "站内书签";
    document.getElementById('m_selectTrigger').innerHTML = `站内书签 <i class="arrow-icon">▸</i>`;
    document.getElementById('searchInput').placeholder = "搜索站内书签...";
    document.getElementById('m_searchInput').placeholder = "搜索站内书签...";
    
    document.querySelectorAll('#pc_selectOptions div, #m_selectOptions div').forEach(div => {
        if(div.getAttribute('data-value') === 'local') div.classList.add('active');

const sidebarEl = document.getElementById('sidebar');
const overlayEl = document.getElementById('sidebarOverlay');

function openSidebar() { sidebarEl.classList.add('open'); overlayEl.classList.add('active'); document.body.classList.add('no-scroll'); }
function closeSidebar() { 
    sidebarEl.classList.remove('open'); 
    overlayEl.classList.remove('active'); 
    document.body.classList.remove('no-scroll'); 
    document.getElementById('m_selectOptions').style.display = 'none';
    document.getElementById('mobileSearchBar').classList.remove('dropdown-open');
}

document.getElementById('menuBtn').addEventListener('click', openSidebar);

// 只要侧边栏打开，点击任何非功能性空白地方一律直接缩回
document.addEventListener('click', (e) => {
    document.getElementById('m_selectOptions').style.display = 'none';
    document.getElementById('pc_selectOptions').style.display = 'none';
    document.getElementById('mobileSearchBar').classList.remove('dropdown-open');
    document.getElementById('searchBar').classList.remove('pc-dropdown-open');
    
    if (window.innerWidth >= 850) return; 
    if (sidebarEl.classList.contains('open')) {
        if (e.target.closest('#menuBtn') || e.target.closest('#mobileSearchBar')) return;
        if (e.target.closest('.nav-item') || e.target.closest('.nav-sub-item')) return;
        closeSidebar();
    }
});

// ===== 🛠️ 定制统一皮肤的密码解密面板逻辑 =====
function openCustomPrompt(title, callback) {
    promptCallback = callback;
    document.getElementById('customPromptTitle').innerText = title;
    document.getElementById('customPromptInput').value = '';
    
    document.getElementById('adminModal').style.display = 'flex';
    document.getElementById('adminSetupView').style.display = 'none';
    document.getElementById('adminLoginView').style.display = 'none';
    document.getElementById('adminEditorView').style.display = 'none';
    document.getElementById('customPromptView').style.display = 'block';
    document.getElementById('adminBox').classList.remove('editor-mode');
    document.body.classList.add('no-scroll');
    setTimeout(() => document.getElementById('customPromptInput').focus(), 150);
}

function closeCustomPrompt(isConfirm) {
    const val = document.getElementById('customPromptInput').value.trim();
    document.getElementById('adminModal').style.display = 'none';
    document.getElementById('customPromptView').style.display = 'none';
    document.body.classList.remove('no-scroll');
    
    if (promptCallback) {
        promptCallback(isConfirm ? val : null);
        promptCallback = null;
    }
}

// 解密空间入口
function unlockSecret() {
    openCustomPrompt("请输入密码查看私藏空间：", (pwd) => {
        if (!pwd) return;
        if (pwd === SECRET_PWD) { 
            document.body.className = 'mode-secret'; render("markdown-secret"); 
            history.pushState({ page: 'secret' }, "", "#secret"); enterMode("私藏页面", "mode-secret"); 
        } else if (pwd === PRIVATE_PWD) { 
            document.body.className = ''; render("markdown-private"); 
            history.pushState({ page: 'private' }, "", "#private"); enterMode("个人空间", "mode-private"); 
        } else { 
            alert("密码错误！"); 
        }
    });
}

    }

window.addEventListener('popstate', (event) => { backToHomeUI(); });

function enterMode(title, modeClass) {

    document.getElementById("mobileSearchBar").style.display = "none";

let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, { passive: true });

// 性能优化：当手机端侧边栏展开时进行划动，锁定阻止原生纵向滚动相互干扰
document.addEventListener('touchmove', e => {
    if (window.innerWidth < 850 && sidebarEl.classList.contains('open')) {
        const currentX = e.touches[0].screenX;
        const deltaX = currentX - touchStartX;
        if (Math.abs(deltaX) > 10) e.preventDefault(); 
    }
}, { passive: false });

document.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; touchEndY = e.changedTouches[0].screenY; handleGesture(); }, { passive: true });

function handleGesture() {
    if (window.innerWidth >= 850) return; 
    const deltaX = touchEndX - touchStartX; const deltaY = touchEndY - touchStartY;
    if (Math.abs(deltaX) > Math.abs(deltaY) + 10) {
        if (deltaX > 20 && !sidebarEl.classList.contains('open')) openSidebar();
        else if (deltaX < -20 && sidebarEl.classList.contains('open')) closeSidebar();
    }
}

// =======================
// 后台 API 与 GitHub 数据流托管
// =======================
function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }
function encryptData(text, key) { let result = ''; for(let i = 0; i < text.length; i++) { result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length)); } return utf8_to_b64(result); }
function decryptData(hash, key) { try { let str = b64_to_utf8(hash); let result = ''; for(let i = 0; i < str.length; i++) { result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length)); } return result; } catch(e) { return null; } }

let ghData = null, currentFullHtml = "", currentFileSha = "", currentTabId = "markdown-main";
let mdContents = { "markdown-main": "", "markdown-secret": "", "markdown-private": "" };

function showStatus(text, color = "var(--color-link-btn)") { const el = document.getElementById('editorStatus'); el.innerText = text; el.style.color = color; }
function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; document.getElementById('customPromptView').style.display = 'none'; const config = localStorage.getItem('gh_admin_config'); if (config) { document.getElementById('adminSetupView').style.display = 'none'; document.getElementById('adminEditorView').style.display = 'none'; document.getElementById('adminLoginView').style.display = 'block'; document.getElementById('adminBox').classList.remove('editor-mode'); setTimeout(() => document.getElementById('loginPwd').focus(), 100); } else { document.getElementById('adminLoginView').style.display = 'none'; document.getElementById('adminEditorView').style.display = 'none'; document.getElementById('adminSetupView').style.display = 'block'; document.getElementById('adminBox').classList.remove('editor-mode'); } document.body.classList.add('no-scroll'); }
function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; document.getElementById('setupPwd').value = ''; document.getElementById('loginPwd').value = ''; document.getElementById('adminBox').classList.remove('editor-mode'); document.body.classList.remove('no-scroll'); }
function saveAdminConfig() { const pwd = document.getElementById('setupPwd').value.trim(), user = document.getElementById('setupUser').value.trim(), repo = document.getElementById('setupRepo').value.trim(), token = document.getElementById('setupToken').value.trim(); if (!pwd || !user || !repo || !token) return alert("各项参数不能为空！"); const rawData = JSON.stringify({ user, repo, token }), encryptedText = encryptData(rawData, pwd); localStorage.setItem('gh_admin_config', encryptedText); alert("配置已保存！"); closeAdmin(); }
function resetAdminConfig() { if(confirm("重置配置？")) { localStorage.removeItem('gh_admin_config'); openAdmin(); } }

function verifyAdmin() {
    const pwd = document.getElementById('loginPwd').value.trim(); if(!pwd) return;
    const hash = localStorage.getItem('gh_admin_config'); const decryptedText = decryptData(hash, pwd);
    if (decryptedText && decryptedText.includes('token')) { ghData = JSON.parse(decryptedText); document.getElementById('adminLoginView').style.display = 'none'; document.getElementById('adminEditorView').style.display = 'flex'; document.getElementById('adminBox').classList.add('editor-mode'); fetchFromGitHub(); } else { alert("密码错误！"); document.getElementById('loginPwd').value = ''; }
}

let catUpdateTimer;
function debounceUpdateCat() { clearTimeout(catUpdateTimer); catUpdateTimer = setTimeout(updateCategoryDropdown, 300); }

function updateCategoryDropdown() {
    const text = document.getElementById("editorTextarea").value;
    const lines = text.split('\n');
    const catSelect = document.getElementById("quickCategory");
    const currentVal = catSelect.value; 
    
    catSelect.innerHTML = '<option value="">-- 选择目标分类 --</option>';
    lines.forEach(line => {
        if (line.trim().startsWith('##')) {
            const isSub = line.trim().startsWith('###');
            const catName = line.replace(/^##+\s+/, '').trim();
            const opt = document.createElement('option');
            opt.value = line.trim(); 
            opt.textContent = (isSub ? '└── ' : '📁 ') + catName;
            catSelect.appendChild(opt);
        }
    });
    if([...catSelect.options].some(o => o.value === currentVal)) { catSelect.value = currentVal; }
}

async function fetchFromGitHub() {
    showStatus("📡 正在连接 GitHub..."); document.getElementById("editorTextarea").disabled = true;
    try {
        const url = `https://api.github.com/repos/${ghData.user}/${ghData.repo}/contents/index.html`;
        const res = await fetch(url, { headers: { "Authorization": `token ${ghData.token}`, "Accept": "application/vnd.github.v3+json" } });
        if (!res.ok) throw new Error("连接失败！请检查配置");
        const data = await res.json(); currentFileSha = data.sha; currentFullHtml = b64_to_utf8(data.content.replace(/\n/g, ''));
        ['markdown-main', 'markdown-secret', 'markdown-private'].forEach(id => { const regex = new RegExp(`(<script id="${id}" type="text\\/plain">)([\\s\\S]*?)(<\\/script>)`); const match = currentFullHtml.match(regex); if (match) mdContents[id] = match[2].trim(); });
        
        document.getElementById("editorTextarea").disabled = false; 
        currentTabId = "markdown-main"; 
        document.getElementById("editorSelect").value = currentTabId; 
        document.getElementById("editorTextarea").value = mdContents[currentTabId]; 
        
        updateCategoryDropdown();
        showStatus("✅ 拉取成功，可以编辑了！");
    } catch (err) { showStatus("❌ " + err.message, "red"); }
}

function switchEditorTab() { 
    mdContents[currentTabId] = document.getElementById("editorTextarea").value; 
    currentTabId = document.getElementById("editorSelect").value; 
    document.getElementById("editorTextarea").value = mdContents[currentTabId]; 
    updateCategoryDropdown();
}

function insertQuickLink() { 
    const nameEl = document.getElementById('quickName'), urlEl = document.getElementById('quickUrl'), catEl = document.getElementById('quickCategory'); 
    let name = nameEl.value.trim(), url = urlEl.value.trim(), catRaw = catEl.value; 
    
    if(!name || !url) return alert("请填入名称 and 网址"); 
    if(!catRaw) return alert("请先选择一个目标分类！");
    
    if(!url.startsWith('http')) url = 'https://' + url; 
    const mdStr = `- [${name}](${url})`; 
    
    const textarea = document.getElementById('editorTextarea');
    let lines = textarea.value.split('\n');
    let targetIdx = -1;
    
    for(let i = 0; i < lines.length; i++) {
        if(lines[i].trim() === catRaw) {
            targetIdx = i; break;
        }
    }
    
    if (targetIdx !== -1) {
        let insertIdx = targetIdx + 1;
        while (insertIdx < lines.length && !lines[insertIdx].trim().startsWith('##')) {
            insertIdx++;
        }
        while (insertIdx > 0 && lines[insertIdx - 1].trim() === '') {
            insertIdx--;
        }
        
        lines.splice(insertIdx, 0, mdStr);
        textarea.value = lines.join('\n');
        
        nameEl.value = ''; urlEl.value = '';
        showStatus(`✅ 快捷添加成功！`, "var(--color-link-btn)");
    } else {
        alert("找不到该分类代码，请检查！");
    }
}

function insertQuickCategory() { 
    const name = prompt("请输入新分类名称：\n(提示: 输入 '## 名称' 创建大类，输入 '### 名称' 创建小类)"); 
    if(name && name.trim()) { 
        const textarea = document.getElementById('editorTextarea');
        const prefix = name.trim().startsWith('#') ? '' : '## ';
        const mdStr = `\n${prefix}${name.trim()}\n`;
        textarea.value = textarea.value.trim() + '\n' + mdStr;
        textarea.scrollTop = textarea.scrollHeight; 
        updateCategoryDropdown();
        showStatus(`📁 新分类创建成功！`, "var(--color-link-btn)");
    } 
}

async function pushToGitHub() {
    mdContents[currentTabId] = document.getElementById("editorTextarea").value; const pushBtn = document.getElementById("pushBtn"); pushBtn.disabled = true; pushBtn.innerText = "正在推送...";
    try {
        let newHtml = currentFullHtml; ['markdown-main', 'markdown-secret', 'markdown-private'].forEach(id => { const regex = new RegExp(`(<script id="${id}" type="text\\/plain">)([\\s\\S]*?)(<\\/script>)`); newHtml = newHtml.replace(regex, `$1\n${mdContents[id]}\n$3`); });
        const res = await fetch(`https://api.github.com/repos/${ghData.user}/${ghData.repo}/contents/index.html`, { method: "PUT", headers: { "Authorization": `token ${ghData.token}`, "Content-Type": "application/json" }, body: JSON.stringify({ message: "Update via Visual Editor", content: utf8_to_b64(newHtml), sha: currentFileSha }) });
        if (!res.ok) throw new Error("推送失败"); alert("🎉 推送成功！大约30秒后刷新生效。"); closeAdmin();
    } catch (err) { showStatus("❌ " + err.message, "red"); } finally { pushBtn.disabled = false; pushBtn.innerText = "🚀 保存并推送到 GitHub"; }
}

document.getElementById('pageTitle').addEventListener('mousedown', (e) => { if (e.button === 0) pressTimer = setTimeout(openAdmin, 3000); });
document.getElementById('pageTitle').addEventListener('mouseup', () => clearTimeout(pressTimer));

    document.getElementById("unlockBtn").addEventListener('click', unlockSecret);
    
    document.getElementById("customPromptInput").addEventListener('keypress', (e) => { if (e.key === 'Enter') closeCustomPrompt(true); });
});
