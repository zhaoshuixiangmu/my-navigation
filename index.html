<style>
/* ===== 默认主题：高级大地色系 (侘寂风) ===== */
:root {
    --bg-main: #F6F5F0;     /* 奶油米白底 */
    --bg-card: #FFFFFF;     /* 纯白卡片提亮 */
    --color-text: #34433A;  /* 深墨绿主文字 */
    --color-border: #E1DFD5;/* 柔和的卡其灰边框 */
    --color-link-btn: #8C7C61; /* 复古金/卡其棕 点缀色 */
}

/* ===== 全局样式 ===== */
body {
    background: var(--bg-main);
    color: var(--color-text);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* ------------------- 私密模式：暗夜森林 ------------------- */
body.secret {
    background: #2B2D2A;    /* 深夜苔藓暗绿 */
    --color-text: #E8E6E1;  /* 柔和的米灰文字 */
    --bg-card: #363937;     /* 深咖灰卡片 */
    --color-border: #4D524E;
    --color-link-btn: #B5A68D; /* 提亮的复古金 */
}

/* ------------------- 元素样式 ------------------- */
h1 {
    text-align: center;
    margin: 20px 0;
    font-size: 26px;
}

/* 返回按钮样式 */
.back-btn {
    display: block;
    margin: 10px auto;
    background: none;
    border: none; 
    color: var(--color-link-btn); 
    padding: 8px 16px; 
    font-size: 14px; 
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    border-radius: 4px;
    transition: background 0.3s, color 0.3s;
    width: fit-content;
}
.back-btn:hover {
    background: rgba(140, 124, 97, 0.1); /* 复古金半透明底 */
    text-decoration: underline;
}
body.secret .back-btn {
    color: var(--color-link-btn);
}
body.secret .back-btn:hover {
    background: rgba(181, 166, 141, 0.15);
}

/* 搜索栏 */
.search-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 0 auto 20px;
    max-width: 600px;
}
select, input, button {
    padding: 6px;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    background: var(--bg-card); 
    color: var(--color-text);
    font-size: 14px;
    transition: background 0.3s, border 0.3s, color 0.3s;
}
select:focus, input:focus {
    outline: none;
    border-color: var(--color-link-btn);
}

/* 搜索按钮特殊定制：致敬图片里的深色主按钮 */
button#searchButton {
    background: var(--color-text); /* 默认深墨绿底 */
    color: var(--bg-main);         /* 奶油白字 */
    border-color: var(--color-text);
    font-weight: bold;
    cursor: pointer;
}
button#searchButton:hover {
    opacity: 0.9;
}

/* 网格布局 (V2.0 终极版骨架 - 焊死高度与省略号) */
main#links {
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto 50px;
}
.links-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 10px;
    grid-auto-rows: 34px; /* 手机端高度死锁 */
}
@media (min-width: 1024px) {
    .links-group { 
        grid-template-columns: repeat(8, minmax(0, 1fr)); 
        grid-auto-rows: 36px; /* 电脑端高度死锁 */
    }
}
@media (max-width: 600px) {
    .links-group { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

/* 分组标题及展开按钮 */
.group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    grid-column: 1 / -1;
    margin-top: 50px; 
    border-bottom: 1px solid var(--color-border);
    padding-bottom: 4px;
}
.group-header h2 {
    font-size: 16px;
    margin: 0;
}

/* 展开/收缩按钮样式 */
.toggle-btn {
    background: none;
    border: none; 
    color: var(--color-link-btn); 
    padding: 0 5px; 
    font-size: 14px; 
    cursor: pointer;
    display: none; 
    user-select: none;
    text-decoration: none;
    transition: color 0.1s;
}
.toggle-btn:hover {
    text-decoration: underline; 
    color: var(--color-link-btn);
}
body.secret .toggle-btn:hover {
    color: var(--color-text); 
}

/* 链接卡片 (V2.0 终极排版) */
.link-card {
    background: var(--bg-card);
    border-radius: 6px;
    padding: 8px;
    border: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    height: 100%;
    box-sizing: border-box;
}
.link-card a {
    color: inherit;
    text-decoration: none;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block; 
    min-width: 0; 
    flex: 1;
    margin-right: 5px; 
}
.copy-btn {
    cursor: pointer;
    font-size: 14px;
    color: #A3A097; /* 暖灰色的复制图标，配合整体大地色 */
}
.links-group.collapsed .link-card.hidden-by-limit {
    display: none;
}

/* 隐蔽小圆点按钮 (还原极简 12px 尺寸) */
#unlockBtn {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    background: rgba(140, 124, 97, 0.3); /* 复古金半透明 */
    cursor: pointer;
    padding: 0;
}
#unlockBtn:hover { background: rgba(140, 124, 97, 0.6); }
body.secret #unlockBtn {
    background: rgba(181, 166, 141, 0.2);
}
body.secret #unlockBtn:hover {
    background: rgba(181, 166, 141, 0.5);
}
</style>
</head>

<script defer>
const SECRET_PWD  = "709394"; 
const PRIVATE_PWD = "abcd"; 
const MOBILE_LIMIT = 10;
const DESKTOP_LIMIT = 16;

function getDisplayLimit() {
    return window.innerWidth <= 600 ? MOBILE_LIMIT : DESKTOP_LIMIT;
}

function parseMarkdown(md) {
    const lines = md.split("\n");
    let html = "";
    let currentGroupName = "";
    let currentLinks = [];
    const displayLimit = getDisplayLimit();

    function flushGroup() {
        if (!currentGroupName || currentLinks.length === 0) return;

        const totalLinks = currentLinks.length;
        const needsToggle = totalLinks > displayLimit;
        const collapsedClass = needsToggle ? 'collapsed' : '';
        const toggleBtnDisplay = needsToggle ? 'inline-block' : 'none';
        
        const initialBtnText = `展开 (${totalLinks} 个)`; 
        
        html += `<div class="group-header">
                    <h2>${currentGroupName}</h2>
                    <button class="toggle-btn" 
                            style="display: ${toggleBtnDisplay}" 
                            data-group-id="${currentGroupName.replace(/\s+/g, '-').toLowerCase()}"
                            data-collapsed="true">
                        ${initialBtnText}
                    </button>
                </div>`;

        html += `<div class="links-group ${collapsedClass}" id="group-${currentGroupName.replace(/\s+/g, '-').toLowerCase()}">`;

        currentLinks.forEach((m, index) => {
            const isHidden = needsToggle && index >= displayLimit;
            const hiddenClass = isHidden ? 'hidden-by-limit' : '';
            html += `<div class="link-card ${hiddenClass}">
                        <a href="${m[2]}" target="_blank" rel="noopener noreferrer">${m[1]}</a>
                        <span class="copy-btn" onclick="copyLink('${m[2]}', this)">📋</span>
                    </div>`;
        });
        
        html += `</div>`; 

        currentGroupName = "";
        currentLinks = [];
    }

    lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        if (line.startsWith("##")) {
            flushGroup();
            currentGroupName = line.replace(/^##+/, "").trim();
        } else if (line.startsWith("- [")) {
            const m = line.match(/- \[(.*?)\]\((.*?)\)/);
            if (m) {
                currentLinks.push(m);
            }
        }
    });
    
    flushGroup();
    
    return html;
}

function render(id) {
    const md = document.getElementById(id).textContent;
    document.getElementById("links").innerHTML = parseMarkdown(md);
    bindToggleEvents();
}

function toggleGroup(btn) {
    const groupId = btn.dataset.groupId;
    const groupElement = document.getElementById(`group-${groupId}`);
    const isCollapsed = groupElement.classList.contains('collapsed');
    const totalLinks = groupElement.querySelectorAll('.link-card').length;
    
    if (isCollapsed) {
        groupElement.classList.remove('collapsed');
        btn.innerHTML = `收起`;
        btn.dataset.collapsed = 'false';
    } else {
        groupElement.classList.add('collapsed');
        btn.innerHTML = `展开 (${totalLinks} 个)`;
        btn.dataset.collapsed = 'true';
    }
}

function bindToggleEvents() {
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.removeEventListener('click', handleToggleClick); 
        btn.addEventListener('click', handleToggleClick);
    });
}
function handleToggleClick(event) {
    toggleGroup(event.currentTarget);
}

function doSearch() {
    const engine = document.getElementById("engine").value;
    const keyword = document.getElementById("searchInput").value.trim();
    if (keyword) window.open(engine + encodeURIComponent(keyword), "_blank");
}

async function copyLink(url, el) {
    try {
        await navigator.clipboard.writeText(url);
        el.innerHTML = "✅";
    } catch (err) {
        console.error('复制失败:', err);
        el.innerHTML = "❌";
    }
    setTimeout(() => el.innerHTML = "📋", 1000);
}

function backToHome() {
    const backBtn = document.getElementById('backBtn');
    if (backBtn) backBtn.remove();
    
    render("markdown-main");
    document.getElementById("pageTitle").innerText = "我的主页";
    document.getElementById("searchBar").style.display = "flex";
    document.getElementById("unlockBtn").style.display = "block";
    document.body.classList.remove("secret");
    
    document.getElementById("searchInput").focus();
}

function unlockSecret() {
    const pwd = prompt("请输入密码查看内容：");
    if (pwd === SECRET_PWD) {
        document.body.classList.remove(...document.body.classList); 
        render("markdown-secret");
        enterMode("私藏页面");
    } else if (pwd === PRIVATE_PWD) {
        document.body.classList.remove(...document.body.classList);
        render("markdown-private");
        enterMode("个人空间");
    } else {
        alert("密码错误！");
    }
}

function enterMode(title) {
    document.getElementById("unlockBtn").style.display = "none";
    document.getElementById("searchBar").style.display = "none";
    document.getElementById("pageTitle").innerText = title;
    document.body.classList.add("secret");
    
    const oldBackBtn = document.getElementById('backBtn');
    if (oldBackBtn) {
        oldBackBtn.remove();
    }
    
    const backBtn = document.createElement('button');
    backBtn.id = 'backBtn';
    backBtn.className = 'back-btn';
    backBtn.innerText = '返回我的主页';
    backBtn.addEventListener('click', backToHome);
    
    document.getElementById("pageTitle").parentNode.insertBefore(backBtn, document.getElementById("pageTitle").nextSibling);
}

document.addEventListener('DOMContentLoaded', () => {
    render("markdown-main");
    
    document.getElementById("searchButton").addEventListener('click', doSearch);
    document.getElementById("unlockBtn").addEventListener('click', unlockSecret);
    
    document.getElementById("searchInput").addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doSearch();
    });
    
    let resizeTimer;
    let lastWidth = window.innerWidth;
    
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        
        if (window.innerWidth !== lastWidth) {
            lastWidth = window.innerWidth;
            
            resizeTimer = setTimeout(() => {
                const currentTitle = document.getElementById("pageTitle").innerText;
                if (document.body.classList.contains('secret')) {
                    if (currentTitle === "私藏页面") {
                        render("markdown-secret");
                        enterMode("私藏页面");  
                    } else if (currentTitle === "个人空间") {
                        render("markdown-private");
                        enterMode("个人空间");  
                    }
                } else {
                    render("markdown-main");
                    const backBtn = document.getElementById('backBtn');
                    if (backBtn) backBtn.remove();
                }
            }, 200); 
        }
    });

    document.getElementById("searchInput").focus();
});
</script>
